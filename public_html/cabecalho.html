<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabeçalho CERAPE</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      background: #fff;
      color: #111111;
      font-family: DejaVu Serif, serif;
    }
    .brand-header {
      align-items: center;
      border-bottom: 1px solid #111;
      display: flex;
      gap: 14px;
      margin: 0 auto;
      max-width: 860px;
      padding-bottom: 3.5mm;
      width: 100%;
    }
    .brand-logo-box,
    .brand-spacer {
      flex: 0 0 92px;
      width: 92px;
    }
    .brand-logo {
      display: block;
      height: 92px;
      object-fit: contain;
      width: 92px;
    }
    .brand-text {
      flex: 1;
      text-align: center;
    }
    .brand-header-title {
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header class="brand-header">
    <div class="brand-logo-box">
      <img class="brand-logo" src="/favicon/logo-512.png" alt="Logo CERAPE" />
    </div>

    <div class="brand-text">
      <div class="brand-header-title">CENTRO DE REABILITAÇÃO DO PRESO E EGRESSO - CERAPE</div>
    </div>

    <div class="brand-spacer" aria-hidden="true"></div>
  </header>
</body>
</html>
