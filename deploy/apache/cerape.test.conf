<VirtualHost *:80>
    ServerName cerape.test
    ServerAlias www.cerape.test
    DocumentRoot /var/www/html/cerape/public

    <Directory /var/www/html/cerape/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/cerape.test_error.log
    CustomLog ${APACHE_LOG_DIR}/cerape.test_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName cerape.test
        ServerAlias www.cerape.test
        DocumentRoot /var/www/html/cerape/public

        SSLEngine on
        SSLCertificateFile /var/www/html/cerape/cerape.test.pem
        SSLCertificateKeyFile /var/www/html/cerape/cerape.test-key.pem

        <Directory /var/www/html/cerape/public>
            Options FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"

        ErrorLog ${APACHE_LOG_DIR}/cerape.test_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/cerape.test_ssl_access.log combined
    </VirtualHost>
</IfModule>
