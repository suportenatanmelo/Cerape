<VirtualHost *:80>
    ServerName cerape.local
    DocumentRoot /var/www/html/cerape.local/public

    <Directory /var/www/html/cerape.local/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/cerape.local_error.log
    CustomLog ${APACHE_LOG_DIR}/cerape.local_access.log combined
</VirtualHost>
